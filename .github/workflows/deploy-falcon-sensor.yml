name: Deploy/Upgrade Falcon Sensor

on:
  workflow_dispatch:
    inputs:
      cloud_provider:
        description: 'Cloud Provider'
        required: true
        type: choice
        options:
          - AKS
          - EKS
          - GKE
      cluster_name:
        description: 'Cluster Name (short name for EKS/GKE, full name for AKS)'
        required: true
        type: string
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - install
          - upgrade
      sensor_version:
        description: 'Sensor version (leave empty for latest)'
        required: false
        type: string
      namespace:
        description: 'Kubernetes namespace'
        required: false
        default: 'falcon-system'
        type: string

env:
  FALCON_NAMESPACE: ${{ inputs.namespace || 'falcon-system' }}
  SENSOR_REGISTRY: registry.crowdstrike.com/falcon-sensor/release/falcon-sensor

jobs:
  deploy-falcon-sensor:
    name: Deploy Falcon Sensor to ${{ inputs.cloud_provider }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Inputs
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 VALIDATING WORKFLOW INPUTS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "You selected:"
          echo "  Cloud Provider: ${{ inputs.cloud_provider }}"
          echo "  Cluster Name: ${{ inputs.cluster_name }}"
          echo "  Action: ${{ inputs.action }}"
          echo "  Namespace: ${{ inputs.namespace || 'falcon-system' }}"
          echo ""

          # Validate cloud provider and cluster name match
          CLOUD="${{ inputs.cloud_provider }}"
          CLUSTER="${{ inputs.cluster_name }}"

          # Check for common mismatches
          if [[ "$CLOUD" == "AKS" && "$CLUSTER" =~ EKS ]]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "❌ ERROR: CLOUD PROVIDER MISMATCH!"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "You selected: Cloud Provider = AKS"
            echo "But cluster name contains 'EKS': $CLUSTER"
            echo ""
            echo "This looks like an AWS EKS cluster, not Azure AKS!"
            echo ""
            echo "❌ You probably meant to select: EKS (not AKS)"
            echo ""
            echo "Please re-run the workflow and select the correct cloud provider:"
            echo "  - For AWS clusters: Select 'EKS'"
            echo "  - For Azure clusters: Select 'AKS'"
            echo "  - For Google Cloud clusters: Select 'GKE'"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          if [[ "$CLOUD" == "AKS" && "$CLUSTER" =~ GKE ]]; then
            echo "❌ ERROR: You selected AKS but cluster name contains 'GKE'"
            echo "Please select 'GKE' as the cloud provider!"
            exit 1
          fi

          if [[ "$CLOUD" == "EKS" && "$CLUSTER" =~ AKS ]]; then
            echo "❌ ERROR: You selected EKS but cluster name contains 'AKS'"
            echo "Please select 'AKS' as the cloud provider!"
            exit 1
          fi

          if [[ "$CLOUD" == "GKE" && "$CLUSTER" =~ (AKS|EKS) ]]; then
            echo "❌ ERROR: You selected GKE but cluster name contains 'AKS' or 'EKS'"
            echo "Please select the correct cloud provider!"
            exit 1
          fi

          echo "✅ Validation passed!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

      - name: Set up Cloud CLI and authenticate
        id: cloud-auth
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Deployment Configuration"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Cloud Provider: ${{ inputs.cloud_provider }}"
          echo "Cluster Name: ${{ inputs.cluster_name }}"
          echo "Action: ${{ inputs.action }}"
          echo "Namespace: ${{ inputs.namespace || 'falcon-system' }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          case "${{ inputs.cloud_provider }}" in
            AKS)
              echo "Setting up Azure CLI..."
              curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

              # Login to Azure
              az login --service-principal \
                -u "${{ secrets.AZURE_CLIENT_ID }}" \
                -p "${{ secrets.AZURE_CLIENT_SECRET }}" \
                --tenant "${{ secrets.AZURE_TENANT_ID }}"

              # Set subscription
              az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

              # Build cluster name in AKS format
              CLUSTER_NAME="${{ inputs.cluster_name }}"
              echo "cluster_identifier=$CLUSTER_NAME" >> $GITHUB_OUTPUT
              echo "✓ Azure authentication successful"
              ;;

            EKS)
              echo "Setting up AWS CLI..."

              # Validate AWS region is set
              AWS_REGION="${{ secrets.AWS_REGION }}"
              if [ -z "$AWS_REGION" ]; then
                echo "❌ Error: AWS_REGION secret is not set"
                echo "Please configure AWS_REGION in GitHub Secrets"
                echo "Example: us-east-1, us-west-2, eu-west-1, etc."
                exit 1
              fi

              # Configure AWS credentials
              aws configure set aws_access_key_id "${{ secrets.AWS_ACCESS_KEY_ID }}"
              aws configure set aws_secret_access_key "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
              aws configure set region "$AWS_REGION"

              echo "Using AWS Region: $AWS_REGION"

              # Get and display caller identity for debugging
              echo "Verifying AWS identity..."
              CALLER_IDENTITY=$(aws sts get-caller-identity)
              echo "$CALLER_IDENTITY"

              ACCOUNT_ID=$(echo "$CALLER_IDENTITY" | jq -r '.Account')
              USER_ARN=$(echo "$CALLER_IDENTITY" | jq -r '.Arn')

              echo "Account ID: $ACCOUNT_ID"
              echo "IAM ARN: $USER_ARN"

              # Build cluster ARN
              CLUSTER_ARN="arn:aws:eks:${AWS_REGION}:${ACCOUNT_ID}:cluster/${{ inputs.cluster_name }}"
              echo "cluster_identifier=$CLUSTER_ARN" >> $GITHUB_OUTPUT
              echo "✓ AWS authentication successful"
              echo "Cluster ARN: $CLUSTER_ARN"
              ;;

            GKE)
              echo "Setting up Google Cloud SDK..."

              # Authenticate with service account
              echo "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" > /tmp/gcp-key.json
              gcloud auth activate-service-account --key-file=/tmp/gcp-key.json

              # Set project
              gcloud config set project "${{ secrets.GCP_PROJECT_ID }}"

              # Build cluster identifier (simple cluster name for GKE)
              echo "cluster_identifier=${{ inputs.cluster_name }}" >> $GITHUB_OUTPUT
              echo "✓ GCP authentication successful"
              ;;

            *)
              echo "❌ Unsupported cloud provider: ${{ inputs.cloud_provider }}"
              exit 1
              ;;
          esac

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Configure kubectl for cluster access
        run: |
          case "${{ inputs.cloud_provider }}" in
            AKS)
              echo "Configuring kubectl for AKS..."
              # Extract resource group and cluster name from full AKS name
              CLUSTER_NAME="${{ inputs.cluster_name }}"

              # If it's a short name, build the full path
              if [[ ! "$CLUSTER_NAME" =~ ^/subscriptions/ ]]; then
                # Short name provided, need resource group
                RESOURCE_GROUP="${{ secrets.AKS_RESOURCE_GROUP }}"
                az aks get-credentials --resource-group "$RESOURCE_GROUP" --name "$CLUSTER_NAME" --overwrite-existing
              else
                # Full path provided, parse it
                RESOURCE_GROUP=$(echo "$CLUSTER_NAME" | sed -n 's#.*/resourcegroups/\([^/]*\)/.*#\1#p')
                CLUSTER_SHORT_NAME=$(echo "$CLUSTER_NAME" | sed -n 's#.*/managedclusters/\([^/]*\)$#\1#p')
                az aks get-credentials --resource-group "$RESOURCE_GROUP" --name "$CLUSTER_SHORT_NAME" --overwrite-existing
              fi
              ;;

            EKS)
              echo "Configuring kubectl for EKS..."
              AWS_REGION="${{ secrets.AWS_REGION }}"
              if [ -z "$AWS_REGION" ]; then
                echo "❌ Error: AWS_REGION secret is not set"
                exit 1
              fi

              echo "Updating kubeconfig for cluster: ${{ inputs.cluster_name }}"
              aws eks update-kubeconfig --name "${{ inputs.cluster_name }}" --region "$AWS_REGION"

              echo ""
              echo "Current IAM identity:"
              aws sts get-caller-identity

              echo ""
              echo "Testing kubectl access..."
              if ! kubectl cluster-info; then
                echo ""
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                echo "❌ KUBECTL ACCESS DENIED"
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                echo ""
                echo "The IAM user/role does not have access to the EKS cluster."
                echo ""
                echo "Current IAM Identity:"
                aws sts get-caller-identity | jq -r '.Arn'
                echo ""
                echo "To fix this, add the IAM user/role to the aws-auth ConfigMap:"
                echo ""
                echo "kubectl edit configmap aws-auth -n kube-system"
                echo ""
                echo "Add this under mapUsers:"
                echo "---"
                IAM_ARN=$(aws sts get-caller-identity | jq -r '.Arn')
                IAM_USER=$(echo "$IAM_ARN" | sed 's/.*\///')
                cat << EOF
  - userarn: $IAM_ARN
    username: $IAM_USER
    groups:
      - system:masters
EOF
                echo "---"
                echo ""
                echo "Or use eksctl:"
                echo "  eksctl create iamidentitymapping \\"
                echo "    --cluster ${{ inputs.cluster_name }} \\"
                echo "    --region $AWS_REGION \\"
                echo "    --arn '$IAM_ARN' \\"
                echo "    --username '$IAM_USER' \\"
                echo "    --group system:masters"
                echo ""
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                exit 1
              fi
              ;;

            GKE)
              echo "Configuring kubectl for GKE..."
              gcloud container clusters get-credentials "${{ inputs.cluster_name }}" \
                --region "${{ secrets.GCP_REGION }}" \
                --project "${{ secrets.GCP_PROJECT_ID }}"
              ;;
          esac

          # Verify cluster access (skip for EKS as it's already verified above)
          if [ "${{ inputs.cloud_provider }}" != "EKS" ]; then
            echo ""
            echo "Verifying cluster access..."
            kubectl cluster-info
            kubectl get nodes
          fi

      - name: Detect GKE Autopilot
        id: detect-autopilot
        if: inputs.cloud_provider == 'GKE'
        run: |
          echo "Checking if cluster is GKE Autopilot..."
          if kubectl get nodes -o json 2>/dev/null | grep -q '"cloud.google.com/gke-autopilot"'; then
            echo "is_autopilot=true" >> $GITHUB_OUTPUT
            echo "⚠️  GKE Autopilot detected - BPF backend will be used"
          else
            echo "is_autopilot=false" >> $GITHUB_OUTPUT
            echo "✓ Standard GKE cluster detected"
          fi

      - name: Download Falcon Container Sensor Pull Script
        run: |
          echo "Downloading falcon-container-sensor-pull.sh..."
          curl -sSL -o falcon-container-sensor-pull.sh \
            "https://raw.githubusercontent.com/CrowdStrike/falcon-scripts/main/bash/containers/falcon-container-sensor-pull/falcon-container-sensor-pull.sh"

          chmod +x falcon-container-sensor-pull.sh
          echo "✓ Script downloaded successfully"

      - name: Get Falcon Pull Token
        id: get-pull-token
        run: |
          echo "Getting Falcon registry pull token..."

          PULL_TOKEN=$(./falcon-container-sensor-pull.sh \
            -u "${{ secrets.FALCON_CLIENT_ID }}" \
            -s "${{ secrets.FALCON_CLIENT_SECRET }}" \
            --type falcon-sensor \
            --platform x86_64 \
            --get-pull-token)

          if [ -z "$PULL_TOKEN" ]; then
            echo "❌ Failed to get pull token"
            exit 1
          fi

          echo "pull_token=$PULL_TOKEN" >> $GITHUB_OUTPUT
          echo "✓ Pull token retrieved successfully"

      - name: Get Falcon Sensor Image Tag
        id: get-sensor-tag
        run: |
          echo "Getting available Falcon Sensor image tags..."

          ./falcon-container-sensor-pull.sh \
            -u "${{ secrets.FALCON_CLIENT_ID }}" \
            -s "${{ secrets.FALCON_CLIENT_SECRET }}" \
            --type falcon-sensor \
            --platform x86_64 \
            --list-tags

          echo ""

          # Get the sensor tag
          if [ -n "${{ inputs.sensor_version }}" ]; then
            SENSOR_TAG="${{ inputs.sensor_version }}"
            echo "Using specified sensor version: $SENSOR_TAG"
          else
            echo "Getting latest sensor tag..."
            SENSOR_TAG=$(./falcon-container-sensor-pull.sh \
              -u "${{ secrets.FALCON_CLIENT_ID }}" \
              -s "${{ secrets.FALCON_CLIENT_SECRET }}" \
              --type falcon-sensor \
              --platform x86_64 \
              --list-tags | grep -E "^[0-9]+\.[0-9]+\.[0-9]+" | head -1)
          fi

          if [ -z "$SENSOR_TAG" ]; then
            echo "❌ Failed to get sensor tag"
            exit 1
          fi

          echo "sensor_tag=$SENSOR_TAG" >> $GITHUB_OUTPUT
          echo "✓ Using Falcon Sensor version: $SENSOR_TAG"

      - name: Create Falcon Namespace
        run: |
          echo "Creating namespace: $FALCON_NAMESPACE"

          if kubectl get namespace "$FALCON_NAMESPACE" &>/dev/null; then
            echo "✓ Namespace already exists"
          else
            kubectl create namespace "$FALCON_NAMESPACE"
            echo "✓ Namespace created"
          fi

          # Label namespace for privileged pod security (required for standard K8s)
          if [ "${{ steps.detect-autopilot.outputs.is_autopilot }}" != "true" ]; then
            echo "Labeling namespace for privileged pod security..."
            kubectl label ns --overwrite "$FALCON_NAMESPACE" pod-security.kubernetes.io/enforce=privileged
            echo "✓ Namespace labeled"
          fi

      - name: Add Falcon Helm Repository
        run: |
          echo "Adding CrowdStrike Helm repository..."
          helm repo add crowdstrike https://crowdstrike.github.io/falcon-helm
          helm repo update
          echo "✓ Helm repository added and updated"

      - name: Deploy/Upgrade Falcon Sensor
        run: |
          echo "=========================================="
          echo "Falcon Sensor Deployment Summary"
          echo "=========================================="
          echo "Cloud Provider: ${{ inputs.cloud_provider }}"
          echo "Cluster: ${{ inputs.cluster_name }}"
          echo "Action: ${{ inputs.action }}"
          echo "Namespace: $FALCON_NAMESPACE"
          echo "Sensor Tag: ${{ steps.get-sensor-tag.outputs.sensor_tag }}"
          echo "Registry: $SENSOR_REGISTRY"
          if [ "${{ steps.detect-autopilot.outputs.is_autopilot }}" == "true" ]; then
            echo "GKE Autopilot: Yes (BPF backend)"
          fi
          echo "=========================================="
          echo ""

          # Build Helm command
          HELM_CMD="helm ${{ inputs.action }} falcon-sensor crowdstrike/falcon-sensor"
          HELM_CMD="$HELM_CMD --namespace $FALCON_NAMESPACE"
          HELM_CMD="$HELM_CMD --set falcon.cid=${{ secrets.FALCON_CID }}"
          HELM_CMD="$HELM_CMD --set node.image.registryConfigJSON=${{ steps.get-pull-token.outputs.pull_token }}"
          HELM_CMD="$HELM_CMD --set node.image.repository=$SENSOR_REGISTRY"
          HELM_CMD="$HELM_CMD --set node.image.tag=${{ steps.get-sensor-tag.outputs.sensor_tag }}"

          # Add GKE Autopilot specific settings
          if [ "${{ steps.detect-autopilot.outputs.is_autopilot }}" == "true" ]; then
            echo "Configuring for GKE Autopilot..."
            HELM_CMD="$HELM_CMD --set node.backend=bpf"
            HELM_CMD="$HELM_CMD --set node.gke.autopilot=true"
          fi

          # Add upgrade-specific flags
          if [ "${{ inputs.action }}" == "upgrade" ]; then
            HELM_CMD="$HELM_CMD --reuse-values"
          fi

          echo "Executing Helm command..."
          echo ""

          # Execute the command
          if eval "$HELM_CMD"; then
            echo ""
            echo "✓ Falcon Sensor ${{ inputs.action }} completed successfully!"
          else
            echo ""
            echo "❌ Falcon Sensor ${{ inputs.action }} failed"
            exit 1
          fi

      - name: Verify Deployment
        run: |
          echo ""
          echo "Verifying Falcon Sensor deployment..."
          echo ""

          # Wait for DaemonSet to be ready
          echo "Waiting for DaemonSet to be ready (timeout: 5 minutes)..."
          kubectl rollout status daemonset/falcon-node-sensor -n "$FALCON_NAMESPACE" --timeout=300s || true

          echo ""
          echo "=========================================="
          echo "Deployment Status"
          echo "=========================================="

          # Show Helm release status
          echo ""
          echo "Helm Release:"
          helm list -n "$FALCON_NAMESPACE"

          # Show DaemonSet status
          echo ""
          echo "DaemonSet Status:"
          kubectl get daemonset -n "$FALCON_NAMESPACE"

          # Show Pods status
          echo ""
          echo "Falcon Sensor Pods:"
          kubectl get pods -n "$FALCON_NAMESPACE" -l app.kubernetes.io/name=falcon-sensor

          # Show Pod details if any are not running
          echo ""
          NOT_RUNNING=$(kubectl get pods -n "$FALCON_NAMESPACE" -l app.kubernetes.io/name=falcon-sensor --no-headers | grep -v "Running" | wc -l)
          if [ "$NOT_RUNNING" -gt 0 ]; then
            echo "⚠️  Warning: Some pods are not in Running state"
            echo ""
            echo "Pod Details:"
            kubectl describe pods -n "$FALCON_NAMESPACE" -l app.kubernetes.io/name=falcon-sensor
          else
            echo "✓ All Falcon Sensor pods are running"
          fi

          echo ""
          echo "=========================================="
          echo "Deployment Complete!"
          echo "=========================================="

      - name: Deployment Summary
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "Falcon Sensor Deployment Summary"
          echo "=========================================="
          echo "Cloud Provider: ${{ inputs.cloud_provider }}"
          echo "Cluster: ${{ inputs.cluster_name }}"
          echo "Action: ${{ inputs.action }}"
          echo "Namespace: ${{ env.FALCON_NAMESPACE }}"
          echo "Status: ${{ job.status }}"
          echo "=========================================="
          echo ""
          echo "Useful Commands:"
          echo "  kubectl get pods -n ${{ env.FALCON_NAMESPACE }}"
          echo "  kubectl logs -n ${{ env.FALCON_NAMESPACE }} -l app.kubernetes.io/name=falcon-sensor"
          echo "  helm status falcon-sensor -n ${{ env.FALCON_NAMESPACE }}"
          echo "  helm list -n ${{ env.FALCON_NAMESPACE }}"
          echo ""

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f /tmp/gcp-key.json
          rm -f falcon-container-sensor-pull.sh
